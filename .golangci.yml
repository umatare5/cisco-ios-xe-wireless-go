version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    staticcheck:
      checks:
        - all
        - "-SA1012"

  exclusions:
    paths:
      - vendor
      - build
      - tmp

    rules:
      - path: ^wnc/client_test\.go$
        linters: [errcheck]
      - path: ^internal/tests/helpers_test\.go$
        linters: [errcheck]

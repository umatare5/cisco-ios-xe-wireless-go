# generated by octocov init
coverage:
  if: true
  paths:
    - coverage/report.out
  exclude:               # Exclude non-library or helper-only code from coverage denominator
    - "^examples/"         # Example programs (not part of shipped library API)
    - "^internal/tests/"   # Test helper utilities not requiring production coverage
    - "^internal/model/"   # Generated or passive model types excluded from coverage metrics
  acceptable: 95%
  badge:
    path: docs/coverage.svg
comment:
  if: is_pull_request
  hideFooterLink: false
summary:
  if: true
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
